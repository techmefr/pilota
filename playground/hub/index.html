<!doctype html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pilota — Dev Hub</title>
<style>
:root {
  --teal:  oklch(62% 0.145 192);
  --gold:  oklch(74% 0.155 88);
  --coral: oklch(64% 0.16 35);
  --sky:   oklch(68% 0.13 238);
  --green: oklch(62% 0.14 155);
  --amber: oklch(72% 0.15 70);
}

[data-theme="dark"] {
  --bg:       oklch(10% 0.016 192);
  --surface:  oklch(13.5% 0.02 192);
  --card:     oklch(16.5% 0.024 192);
  --card-hi:  oklch(19.5% 0.028 192);
  --text:     oklch(87% 0.01 192);
  --text-2:   oklch(60% 0.016 192);
  --text-3:   oklch(42% 0.013 192);
  --border:   oklch(25% 0.028 192);
  --border-hi:oklch(36% 0.042 192);

  --teal-bg:  oklch(17% 0.045 192);
  --teal-txt: oklch(70% 0.13 192);
  --teal-brd: oklch(30% 0.065 192);

  --gold-bg:  oklch(17% 0.045 88);
  --gold-txt: oklch(80% 0.14 88);
  --gold-brd: oklch(30% 0.065 88);

  --coral-bg:  oklch(16% 0.04 35);
  --coral-txt: oklch(72% 0.14 35);
  --coral-brd: oklch(28% 0.06 35);

  --sky-bg:   oklch(16% 0.04 238);
  --sky-txt:  oklch(70% 0.12 238);
  --sky-brd:  oklch(28% 0.06 238);

  --green-bg:  oklch(16% 0.04 155);
  --green-txt: oklch(65% 0.13 155);
  --amber-bg:  oklch(17% 0.04 70);
  --amber-txt: oklch(76% 0.14 70);

  --shadow: oklch(0% 0 0 / 0.4);
  --shadow-hi: oklch(0% 0 0 / 0.6);
}

[data-theme="light"] {
  --bg:       oklch(95% 0.01 192);
  --surface:  oklch(92.5% 0.012 192);
  --card:     oklch(99% 0.006 192);
  --card-hi:  oklch(97% 0.012 192);
  --text:     oklch(17% 0.015 192);
  --text-2:   oklch(44% 0.02 192);
  --text-3:   oklch(62% 0.015 192);
  --border:   oklch(86% 0.02 192);
  --border-hi:oklch(72% 0.04 192);

  --teal-bg:  oklch(94% 0.022 192);
  --teal-txt: oklch(34% 0.1 192);
  --teal-brd: oklch(80% 0.05 192);

  --gold-bg:  oklch(94% 0.022 88);
  --gold-txt: oklch(34% 0.1 88);
  --gold-brd: oklch(80% 0.05 88);

  --coral-bg:  oklch(94% 0.022 35);
  --coral-txt: oklch(34% 0.1 35);
  --coral-brd: oklch(80% 0.05 35);

  --sky-bg:   oklch(94% 0.022 238);
  --sky-txt:  oklch(34% 0.1 238);
  --sky-brd:  oklch(80% 0.05 238);

  --green-bg:  oklch(93% 0.022 155);
  --green-txt: oklch(30% 0.1 155);
  --amber-bg:  oklch(94% 0.022 70);
  --amber-txt: oklch(36% 0.1 70);

  --shadow: oklch(40% 0.05 192 / 0.08);
  --shadow-hi: oklch(40% 0.05 192 / 0.14);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
a { text-decoration: none; color: inherit; }

html { transition: background 0.25s ease, color 0.25s ease; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ──────────────────────────────────────── */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 2.5rem;
  height: 56px;
  display: flex;
  align-items: center;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.header-inner {
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 1rem;
}

.logo {
  display: flex;
  align-items: center;
  gap: 0.625rem;
  flex-shrink: 0;
}

.logo-mark {
  width: 26px;
  height: 26px;
  border-radius: 6px;
  background: var(--teal-bg);
  border: 1px solid var(--teal-brd);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.logo-mark svg { display: block; }

.logo-name {
  font-size: 0.9rem;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.02em;
}

.logo-sep {
  width: 1px;
  height: 14px;
  background: var(--border-hi);
  flex-shrink: 0;
}

.logo-sub {
  font-size: 0.625rem;
  font-weight: 600;
  color: var(--text-3);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.header-gap { flex: 1; }

.branch-pill {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  background: var(--teal-bg);
  color: var(--teal-txt);
  border: 1px solid var(--teal-brd);
  padding: 0.28rem 0.65rem;
  border-radius: 999px;
  font-size: 0.625rem;
  font-weight: 700;
  letter-spacing: 0.03em;
  font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace;
}

.branch-pill svg { flex-shrink: 0; }

.status-chip {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text-2);
  padding: 0.28rem 0.65rem;
  border-radius: 999px;
  font-size: 0.625rem;
  font-weight: 600;
}

.pulse-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse-ring 2.4s ease-out infinite;
  flex-shrink: 0;
}

@keyframes pulse-ring {
  0%   { box-shadow: 0 0 0 0   oklch(62% 0.14 155 / 0.75); }
  70%  { box-shadow: 0 0 0 5px oklch(62% 0.14 155 / 0);    }
  100% { box-shadow: 0 0 0 0   oklch(62% 0.14 155 / 0);    }
}

.theme-toggle {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-3);
  transition: background 0.15s, border-color 0.15s, color 0.15s;
  flex-shrink: 0;
}

.theme-toggle:hover {
  background: var(--card);
  border-color: var(--border-hi);
  color: var(--text);
}

.icon-sun, .icon-moon { display: none; }
[data-theme="dark"]  .icon-sun  { display: block; }
[data-theme="light"] .icon-moon { display: block; }

/* ── Main ────────────────────────────────────────── */
.main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 2.75rem 2.5rem 5rem;
}

/* ── Section ─────────────────────────────────────── */
.section { margin-bottom: 3.5rem; }

.section-head {
  display: flex;
  align-items: center;
  gap: 0;
  margin-bottom: 1.5rem;
}

.section-num {
  font-size: 0.575rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  color: var(--text-3);
  font-variant-numeric: tabular-nums;
  width: 2rem;
}

.section-title {
  font-size: 0.625rem;
  font-weight: 800;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.section-title.col-teal  { color: var(--teal-txt); }
.section-title.col-gold  { color: var(--gold-txt); }
.section-title.col-sky   { color: var(--sky-txt);  }
.section-title.col-coral { color: var(--coral-txt);}

.section-rule {
  flex: 1;
  height: 1px;
  margin: 0 1rem;
  background: var(--border);
}

.section-count {
  font-size: 0.575rem;
  font-weight: 600;
  color: var(--text-3);
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 0.18rem 0.55rem;
  border-radius: 999px;
  letter-spacing: 0.04em;
}

/* ── Grids ───────────────────────────────────────── */
.grid-2 {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1rem;
}

.grid-3 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.875rem;
}

@media (max-width: 960px) {
  .grid-3 { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 680px) {
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .main { padding: 2rem 1.25rem 4rem; }
  .header { padding: 0 1.25rem; }
}

/* ── Frontend Cards (generous) ───────────────────── */
.card {
  display: flex;
  flex-direction: column;
  background: var(--card);
  border-radius: 14px;
  border: 1px solid var(--border);
  padding: 1.375rem;
  transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
  box-shadow: 0 2px 8px var(--shadow);
}

.card:hover {
  border-color: var(--border-hi);
  background: var(--card-hi);
  box-shadow: 0 6px 24px var(--shadow-hi);
}

.card-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.5rem;
  margin-bottom: 1rem;
}

.card-status {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  font-size: 0.575rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  flex-shrink: 0;
}

.card-status::before {
  content: '';
  display: block;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}

.status-pret { color: var(--green-txt); }
.status-pret::before { background: var(--green); }

.status-en-cours { color: var(--amber-txt); }
.status-en-cours::before {
  background: var(--amber);
  animation: pulse-amber 2s ease-out infinite;
}

@keyframes pulse-amber {
  0%   { box-shadow: 0 0 0 0   oklch(72% 0.15 70 / 0.7); }
  70%  { box-shadow: 0 0 0 5px oklch(72% 0.15 70 / 0);   }
  100% { box-shadow: 0 0 0 0   oklch(72% 0.15 70 / 0);   }
}

.card-domain {
  font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace;
  font-size: 0.6rem;
  font-weight: 500;
  padding: 0.22rem 0.55rem;
  border-radius: 5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 60%;
}

.chip-teal  { background: var(--teal-bg);  color: var(--teal-txt);  border: 1px solid var(--teal-brd);  }
.chip-gold  { background: var(--gold-bg);  color: var(--gold-txt);  border: 1px solid var(--gold-brd);  }
.chip-sky   { background: var(--sky-bg);   color: var(--sky-txt);   border: 1px solid var(--sky-brd);   }
.chip-coral { background: var(--coral-bg); color: var(--coral-txt); border: 1px solid var(--coral-brd); }

.card-name {
  font-size: 1.05rem;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.02em;
  margin-bottom: 0.425rem;
  line-height: 1.2;
}

.card-desc {
  font-size: 0.775rem;
  color: var(--text-2);
  line-height: 1.6;
}

.card-valide {
  display: flex;
  align-items: flex-start;
  gap: 0.5rem;
  font-size: 0.72rem;
  color: var(--text-3);
  font-style: italic;
  margin-top: 0.75rem;
  line-height: 1.5;
}

.valide-label {
  font-size: 0.525rem;
  font-weight: 800;
  color: var(--teal-txt);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-style: normal;
  border: 1px solid var(--teal-brd);
  background: var(--teal-bg);
  padding: 0.15rem 0.38rem;
  border-radius: 3px;
  flex-shrink: 0;
  margin-top: 0.1rem;
  line-height: 1;
}

/* ── Stack display: front → backends ─────────────── */
.card-stack {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-top: 0.875rem;
  flex-wrap: wrap;
}

.stack-front {
  font-size: 0.625rem;
  font-weight: 700;
  color: var(--teal-txt);
  background: var(--teal-bg);
  border: 1px solid var(--teal-brd);
  padding: 0.2rem 0.5rem;
  border-radius: 5px;
  white-space: nowrap;
}

.stack-arrow {
  font-size: 0.65rem;
  color: var(--text-3);
  flex-shrink: 0;
}

.stack-backends {
  display: flex;
  gap: 0.3rem;
  flex-wrap: wrap;
}

.stack-be {
  font-size: 0.6rem;
  font-weight: 600;
  color: var(--gold-txt);
  background: var(--gold-bg);
  border: 1px solid var(--gold-brd);
  padding: 0.2rem 0.45rem;
  border-radius: 5px;
  white-space: nowrap;
}

.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.3rem;
  margin-top: auto;
  padding-top: 0.875rem;
}

.tag {
  font-size: 0.555rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--text-3);
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 0.18rem 0.45rem;
  border-radius: 4px;
  text-transform: uppercase;
}

/* ── Backend Cards (compact, 3-col) ──────────────── */
.card.compact {
  padding: 1.125rem;
}

.card.compact .card-name { font-size: 0.9rem; }
.card.compact .card-desc { font-size: 0.73rem; }
.card.compact .card-valide { font-size: 0.685rem; margin-top: 0.625rem; }

/* ── Tooling List ─────────────────────────────────── */
.tool-list {
  display: flex;
  flex-direction: column;
  gap: 0;
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}

.tool-row {
  display: grid;
  grid-template-columns: 160px 180px 1fr auto;
  align-items: center;
  gap: 1.25rem;
  padding: 0.875rem 1.25rem;
  border-bottom: 1px solid var(--border);
  background: var(--card);
  transition: background 0.12s;
}

.tool-row:last-child { border-bottom: none; }

.tool-row:hover { background: var(--card-hi); }

.tool-identity { display: flex; flex-direction: column; gap: 0.25rem; }

.tool-name {
  font-size: 0.825rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.01em;
}

.tool-domain {
  font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace;
  font-size: 0.575rem;
  color: var(--text-3);
}

.tool-desc {
  font-size: 0.73rem;
  color: var(--text-2);
  line-height: 1.55;
}

.tool-tags {
  display: flex;
  gap: 0.3rem;
  justify-content: flex-end;
  flex-wrap: wrap;
}

@media (max-width: 900px) {
  .tool-row {
    grid-template-columns: 140px 1fr;
    grid-template-rows: auto auto;
  }
  .tool-domain { display: none; }
  .tool-desc   { grid-column: 2; grid-row: 1; }
  .tool-tags   { grid-column: 1 / -1; justify-content: flex-start; }
}

@media (max-width: 600px) {
  .tool-row {
    grid-template-columns: 1fr;
    grid-template-rows: auto;
  }
  .tool-desc { grid-column: 1; grid-row: 2; }
  .tool-tags { justify-content: flex-start; }
}

/* ── Quick links ─────────────────────────────────── */
.quick-links {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  flex-wrap: wrap;
  margin-top: -1rem;
  margin-bottom: 3.5rem;
}

.quick-link {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.35rem 0.8rem;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--card);
  font-size: 0.65rem;
  font-weight: 600;
  color: var(--text-2);
  transition: background 0.12s, border-color 0.12s, color 0.12s;
}

.quick-link:hover {
  background: var(--card-hi);
  border-color: var(--border-hi);
  color: var(--text);
}

.quick-link svg { flex-shrink: 0; opacity: 0.6; }

.ql-label-prefix {
  font-size: 0.575rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-3);
  margin-right: 0.25rem;
  padding-right: 0.75rem;
  border-right: 1px solid var(--border);
}

/* ── Footer ──────────────────────────────────────── */
footer {
  max-width: 1200px;
  margin: 0 auto;
  padding: 1.25rem 2.5rem 2.5rem;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  flex-wrap: wrap;
}

.footer-brand {
  font-size: 0.65rem;
  font-weight: 800;
  color: var(--teal-txt);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.footer-note { font-size: 0.625rem; color: var(--text-3); }
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-mark">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="7" cy="7" r="2.5" fill="var(--teal-txt)"/>
          <circle cx="7" cy="7" r="5.5" stroke="var(--teal-txt)" stroke-width="1.2" fill="none" opacity="0.45"/>
        </svg>
      </div>
      <span class="logo-name">Pilota POC</span>
      <span class="logo-sep"></span>
      <span class="logo-sub">Dev Hub</span>

    <span class="branch-pill">
      <svg width="9" height="9" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">

      </svg>
      <span id="branch-label">...</span>

      <span class="pulse-dot"></span>

    <button class="theme-toggle" id="theme-toggle" aria-label="Basculer le thème">
      <!-- Sun (shown in dark mode) -->
      <svg class="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>

        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </div>
</header>

<main class="main">

  <!-- Quick links -->
  <div class="quick-links" id="quick-links">
    <span class="ql-label-prefix">Liens rapides</span>
    <a class="quick-link" href="https://dashboard.stripe.com/test/dashboard" target="_blank" rel="noopener">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
      Stripe Test
    </a>
    <a class="quick-link" href="https://supabase.com/docs" target="_blank" rel="noopener">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Supabase Docs
    </a>
    <a class="quick-link" href="https://linear.app" target="_blank" rel="noopener">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      Linear
    </a>

<script>
const branch = window.location.hostname.replace(/-hub\.localhost$/, '') || 'main'

document.getElementById('branch-label').textContent = branch

const b  = slug => `http://${branch}-${slug}.localhost`
const sh = slug => `http://${slug}.localhost`

// Theme toggle
const root = document.documentElement
const toggle = document.getElementById('theme-toggle')
const saved = localStorage.getItem('hub-theme')
if (saved === 'light' || saved === 'dark') root.setAttribute('data-theme', saved)

toggle.addEventListener('click', () => {
  const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'
  root.setAttribute('data-theme', next)
  localStorage.setItem('hub-theme', next)
})

// Data
const frontends = [
  {
    url: b('shoplab'), domain: `${branch}-shoplab.localhost`, chip: 'teal',
    name: 'Shoplab', status: 'pret',
    desc: 'Vitrine e-commerce multi-driver. Produits via Nhost (GraphQL), panier et commandes via Lomkit (REST Laravel), chat SAV en temps réel via Supabase.',
    valide: 'Les 3 drivers Pilota actifs simultanément sur un même frontend — le cas d\'usage clé du SDK.',
    front: 'Nuxt 4 · Vuetify', backends: ['Nhost', 'Lomkit', 'Supabase'],
    tags: ['Tolgee', 'Stripe', 'i18n'],
  },
  {
    url: b('pulse'), domain: `${branch}-pulse.localhost`, chip: 'teal',
    name: 'Pulse', status: 'pret',
    desc: 'Dashboard hebdo équipe. Santé projets, objectifs, congés, livraisons, DevOps, CA, contrats, missions.',
    valide: 'Driver Lomkit avec données réelles Laravel + fallback mock pour les Objectifs — démo du système de mock Pilota.',
    front: 'Next.js 15 · React 19', backends: ['Lomkit'],
    tags: ['Tolgee', 'OSDD'],
  },
  {
    url: b('vota'), domain: `${branch}-vota.localhost`, chip: 'teal',
    name: 'Vota', status: 'pret',
    desc: 'Planning poker collaboratif en temps réel. Sessions de vote, révélation synchronisée, export CSV/JSON/Jira.',
    valide: 'Driver WebSocket/subscriptions GraphQL — état partagé en temps réel sans polling.',
    front: 'SvelteKit · Svelte 5', backends: ['Nhost'],
    tags: ['GraphQL WS', 'Tolgee'],
  },
  {
    url: b('gearup'), domain: `${branch}-gearup.localhost`, chip: 'teal',
    name: 'Gearup', status: 'en-cours',
    desc: 'Configurateur postes HP par profil (dev, CDP, commercial). Driver Lomkit, OSDD complet, resources Zod typées.',
    valide: 'Driver Lomkit sur un frontend Astro non-React + OSDD côté client avec resources Zod.',
    front: 'Astro 5 · React', backends: ['Lomkit'],
    tags: ['OSDD', 'Tolgee'],
  },
  {
    url: b('fleet'), domain: `${branch}-fleet.localhost`, chip: 'teal',
    name: 'Fleet Commander', status: 'pret',
    desc: 'Hypervision parc HP. Dashboard temps réel (Supabase), inventaire réactif (Lomkit), vue détail PC agrégée (3 drivers).',
    valide: 'Intégration Pilota SDK dans Angular 19 — PilotaService Injectable + adapter RxJS transformant les Promise/subscribe en Observables.',

    tags: ['RxJS', 'Signals', 'Tolgee'],
  },
]

const backends = [
  {
    url: b('api'), domain: `${branch}-api.localhost`, chip: 'gold',
    name: 'Laravel', status: 'pret',
    desc: 'API REST Lomkit. Produits, panier, commandes Shoplab, profils HP Gearup, données Pulse. OSDD, 5 layers fonctionnels.',

function statusLabel(s) {
  return s === 'en-cours' ? 'En cours' : 'Prêt'
}

function cardFrontend({ url, domain, chip, name, status, desc, valide, front, backends: be, tags }) {
  const beHtml = be.map(b => `<span class="stack-be">${b}</span>`).join('')
  return `<a class="card" href="${url}" target="_blank" rel="noopener">
    <div class="card-meta">
      <span class="card-status status-${status}">${statusLabel(status)}</span>
      <span class="card-domain chip-${chip}">${domain}</span>
    </div>
    <p class="card-name">${name}</p>
    <p class="card-desc">${desc}</p>
    ${valide ? `<p class="card-valide"><span class="valide-label">Valide</span>${valide}</p>` : ''}
    <div class="card-stack">
      <span class="stack-front">${front}</span>
      <span class="stack-arrow">→</span>
      <div class="stack-backends">${beHtml}</div>
    </div>
    <div class="card-tags">${tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
  </a>`
}

function cardBackend({ url, domain, chip, name, status, desc, valide, front, backends: be, tags }) {
  return `<a class="card compact" href="${url}" target="_blank" rel="noopener">
    <div class="card-meta">
      <span class="card-status status-${status}">${statusLabel(status)}</span>
      <span class="card-domain chip-${chip}">${domain}</span>
    </div>
    <p class="card-name">${name}</p>
    <p class="card-desc">${desc}</p>

      <span class="stack-arrow">→</span>
      <div class="stack-backends">${be.map(b => `<span class="stack-be">${b}</span>`).join('')}</div>
    </div>
    <div class="card-tags">${tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
  </a>`
}

function toolRow({ url, domain, chip, name, desc, tags }) {
  return `<a class="tool-row" href="${url}" target="_blank" rel="noopener">
    <div class="tool-identity">
      <span class="tool-name">${name}</span>
      <code class="tool-domain chip-${chip}" style="display:inline-block; padding: 0.15rem 0.4rem; border-radius:4px; font-size:0.575rem;">${domain}</code>
    </div>
    <p class="tool-desc">${desc}</p>
    <div class="tool-tags">${tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
  </a>`
}

document.getElementById('frontends').innerHTML = frontends.map(cardFrontend).join('')
document.getElementById('backends').innerHTML  = backends.map(cardBackend).join('')
document.getElementById('tooling').innerHTML   = tooling.map(toolRow).join('')
</script>

</body>
