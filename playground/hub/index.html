<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pilota — Dev Hub</title>
<style>
:root {
  --teal:       #2BA8A2;
  --teal-light: #3CC4BD;
  --teal-dark:  #1E8C86;
  --teal-bg:    #E8F6F5;
  --gold:       #FFD23F;
  --gold-dark:  #B38A00;
  --coral:      #EF6C4A;
  --coral-dark: #D45233;
  --sky:        #5DADE2;
  --cream:      #FFF8E7;
  --surface:    #EFF8F7;
  --card:       #FFFFFF;
  --text:       #0D1E1D;
  --text-muted: #527774;
  --border:     #C2DAD7;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
a { text-decoration: none; color: inherit; }

body {
  background: var(--surface);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ── */
.header {
  background: var(--teal-dark);
  padding: 2rem 2rem 1.875rem;
  position: relative;
  overflow: hidden;
}

.header::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 280px; height: 280px;
  border-radius: 50%;
  background: rgba(60,196,189,0.12);
  pointer-events: none;
}

.header::after {
  content: '';
  position: absolute;
  bottom: -40px; left: 30%;
  width: 180px; height: 180px;
  border-radius: 50%;
  background: rgba(255,210,63,0.06);
  pointer-events: none;
}

.header-inner {
  max-width: 1120px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 1.5rem;
  flex-wrap: wrap;
}

/* Logo — Flip7 packaging: cream parallelogram box */
.logo-box {
  display: inline-flex;
  background: var(--cream);
  padding: 0.5rem 1.125rem 0.5rem 1.25rem;
  border-radius: 14px;
  border: 3px solid rgba(0,0,0,0.22);
  transform: skewX(-5deg);
  box-shadow: 4px 4px 0 rgba(0,0,0,0.18);
  margin-bottom: 0.875rem;
}

.logo-inner {
  transform: skewX(5deg);
  display: flex;
  align-items: baseline;
  gap: 0.25rem;
  line-height: 1;
}

.logo-name {
  font-size: 1.5rem;
  font-weight: 900;
  color: var(--teal-dark);
  letter-spacing: 5px;
  text-transform: uppercase;
}

.logo-poc {
  font-size: 2.375rem;
  font-weight: 900;
  color: var(--gold-dark);
  text-shadow: 2px 2px 0 rgba(0,0,0,0.12);
  transform: rotate(3deg) translateY(-1px);
  display: inline-block;
  letter-spacing: -1px;
  line-height: 1;
}

.header-eyebrow {
  font-size: 0.625rem;
  font-weight: 800;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--teal-light);
  margin-bottom: 0.5rem;
}

.branch-pill {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  background: var(--gold);
  color: #5a3d00;
  padding: 0.3rem 0.875rem;
  border-radius: 999px;
  font-size: 0.68rem;
  font-weight: 800;
  letter-spacing: 0.5px;
  box-shadow: 0 3px 12px rgba(255,210,63,0.45);
}

.branch-pill svg { flex-shrink: 0; }

.header-status {
  display: flex;
  align-items: flex-start;
  padding-top: 0.25rem;
}

.status-chip {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  background: rgba(255,255,255,0.11);
  border: 1.5px solid rgba(255,255,255,0.18);
  color: #fff;
  padding: 0.35rem 0.875rem;
  border-radius: 999px;
  font-size: 0.72rem;
  font-weight: 700;
}

.pulse-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--gold);
  animation: pulse-ring 2s ease-out infinite;
}

@keyframes pulse-ring {
  0%   { box-shadow: 0 0 0 0   rgba(255,210,63,0.7); }
  70%  { box-shadow: 0 0 0 6px rgba(255,210,63,0);   }
  100% { box-shadow: 0 0 0 0   rgba(255,210,63,0);   }
}

/* ── Main ── */
.main {
  max-width: 1120px;
  margin: 0 auto;
  padding: 2.25rem 2rem 4rem;
}

/* ── Section ── */
.section { margin-bottom: 2.75rem; }

.section-head {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1.25rem;
  padding-bottom: 0.75rem;
  border-bottom: 2.5px dashed var(--border);
}

.section-num {
  font-size: 2.75rem;
  font-weight: 900;
  color: var(--teal);
  line-height: 1;
  letter-spacing: -2px;
  font-variant-numeric: tabular-nums;
}

.section-title {
  font-size: 0.75rem;
  font-weight: 900;
  color: var(--teal-dark);
  letter-spacing: 4px;
  text-transform: uppercase;
}

.section-count {
  margin-left: auto;
  font-size: 0.625rem;
  font-weight: 700;
  color: var(--text-muted);
  background: var(--teal-bg);
  border: 1px solid var(--border);
  padding: 0.2rem 0.6rem;
  border-radius: 999px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ── Grid ── */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0.875rem;
}

.grid.col-3 { grid-template-columns: repeat(3, 1fr); }

@media (max-width: 900px) {
  .grid.col-3 { grid-template-columns: repeat(2, 1fr); }
  .grid.col-3 > a:last-child:nth-child(odd) { grid-column: 1 / -1; }
}

@media (max-width: 600px) {
  .grid, .grid.col-3 { grid-template-columns: 1fr; }
  .grid.col-3 > a:last-child:nth-child(odd) { grid-column: auto; }
  .main { padding: 1.5rem 1rem 3rem; }
  .header { padding: 1.5rem 1rem 1.5rem; }
}

/* ── Card ── */
.card {
  display: flex;
  flex-direction: column;
  background: var(--card);
  border-radius: 16px;
  border: 1.5px solid var(--border);
  border-left: 5px solid var(--teal);
  padding: 1.125rem 1.125rem 1rem 1rem;
  min-height: 210px;
  transition: transform 0.2s cubic-bezier(0.16,1,0.3,1), box-shadow 0.2s cubic-bezier(0.16,1,0.3,1);
  box-shadow: 0 2px 8px rgba(43,168,162,0.07);
}

.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 28px rgba(43,168,162,0.18);
}

.card.gold  { border-left-color: var(--gold); }
.card.gold:hover  { box-shadow: 0 8px 28px rgba(255,210,63,0.28); }

.card.coral { border-left-color: var(--coral); }
.card.coral:hover { box-shadow: 0 8px 28px rgba(239,108,74,0.22); }

.card.sky   { border-left-color: var(--sky); }
.card.sky:hover   { box-shadow: 0 8px 28px rgba(93,173,226,0.25); }

.card-lead {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.5rem;
  margin-bottom: 0.75rem;
}

.card-status {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  font-size: 0.6rem;
  font-weight: 800;
  color: #fff;
  background: var(--teal);
  padding: 0.225rem 0.6rem;
  border-radius: 999px;
  text-transform: uppercase;
  letter-spacing: 0.75px;
  flex-shrink: 0;
}

.card-status .dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 5px rgba(255,210,63,0.9);
}

.card-domain {
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
  font-size: 0.62rem;
  font-weight: 600;
  color: var(--teal-dark);
  background: var(--teal-bg);
  border: 1px solid var(--border);
  padding: 0.2rem 0.5rem;
  border-radius: 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 62%;
}

.card-name {
  font-size: 1rem;
  font-weight: 800;
  color: var(--teal-dark);
  letter-spacing: 0.25px;
  margin-bottom: 0.375rem;
}

.card-desc {
  font-size: 0.775rem;
  color: var(--text-muted);
  line-height: 1.55;
  flex: 1;
}

.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.3rem;
  margin-top: 0.875rem;
}

.tag {
  font-size: 0.585rem;
  font-weight: 700;
  letter-spacing: 0.5px;
  color: var(--teal-dark);
  background: var(--teal-bg);
  border: 1px solid var(--border);
  padding: 0.175rem 0.45rem;
  border-radius: 5px;
  text-transform: uppercase;
}

/* ── Footer ── */
footer {
  max-width: 1120px;
  margin: 0 auto;
  padding: 1.5rem 2rem 2.5rem;
  border-top: 2.5px dashed var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  flex-wrap: wrap;
}

.footer-brand {
  font-size: 0.75rem;
  font-weight: 800;
  color: var(--teal);
  letter-spacing: 1px;
}

.footer-note {
  font-size: 0.7rem;
  color: var(--text-muted);
  font-weight: 500;
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div>
      <div class="logo-box">
        <div class="logo-inner">
          <span class="logo-name">Pilota</span>
          <span class="logo-poc">POC</span>
        </div>
      </div>
      <div class="header-eyebrow">Internal — Dev Hub</div>
      <div class="branch-pill">
        <svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd" d="M11.75 2.5a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5zm-2.25.75a2.25 2.25 0 1 1 3 2.122V6A2.5 2.5 0 0 1 10 8.5H6a1 1 0 0 0-1 1v1.128a2.251 2.251 0 1 1-1.5 0V5.372a2.25 2.25 0 1 1 1.5 0v1.836A2.492 2.492 0 0 1 6 7h4a1 1 0 0 0 1-1v-.628A2.25 2.25 0 0 1 9.5 3.25zM4.25 12a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5z"/>
        </svg>
        <span id="branch-label">...</span>
      </div>
    </div>
    <div class="header-status">
      <span class="status-chip">
        <span class="pulse-dot"></span>
        <span id="service-count">10</span> services
      </span>
    </div>
  </div>
</header>

<main class="main">

  <section class="section">
    <div class="section-head">
      <span class="section-num">01</span>
      <span class="section-title">Frontends</span>
      <span class="section-count">4 services</span>
    </div>
    <div class="grid" id="frontends"></div>
  </section>

  <section class="section">
    <div class="section-head">
      <span class="section-num">02</span>
      <span class="section-title">Backends</span>
      <span class="section-count">3 services</span>
    </div>
    <div class="grid col-3" id="backends"></div>
  </section>

  <section class="section">
    <div class="section-head">
      <span class="section-num">03</span>
      <span class="section-title">Tooling</span>
      <span class="section-count">3 services</span>
    </div>
    <div class="grid col-3" id="tooling"></div>
  </section>

</main>

<footer>
  <span class="footer-brand">Pilota POC</span>
  <span class="footer-note">Internal dev tools · Not for production</span>
</footer>

<script>
// Extract branch from current hostname.
// "feature-auth-hub.localhost" → branch = "feature-auth"
// "dev-hub.localhost"          → branch = "dev"
const hostname = window.location.hostname
const branch = hostname.replace(/-hub\.localhost$/, '')

document.getElementById('branch-label').textContent = branch || 'local'

const b  = (slug) => `http://${branch}-${slug}.localhost`
const sh = (slug) => `http://${slug}.localhost`

const frontends = [
  {
    url: b('shoplab'), domain: `${branch}-shoplab.localhost`,
    name: 'Shoplab', accent: '',
    desc: 'Vitrine e-commerce multi-driver. Produits via Nhost (GraphQL), panier via Lomkit (REST Laravel), chat SAV en temps réel via Supabase Realtime. Démo des 3 drivers Pilota simultanés.',
    tags: ['Nuxt 4', 'Vuetify', 'Nhost', 'Lomkit', 'Supabase', 'Tolgee'],
  },
  {
    url: b('pulse'), domain: `${branch}-pulse.localhost`,
    name: 'Pulse', accent: 'gold',
    desc: 'Dashboard hebdo équipe. 9 sections: santé projets, objectifs, congés, livraisons, DevOps, infos semaine, CA, contrats, missions. Données Laravel, mode présentation.',
    tags: ['Next.js 15', 'React 19', 'Lomkit', 'Tolgee', 'OSDD'],
  },
  {
    url: b('vota'), domain: `${branch}-vota.localhost`,
    name: 'Vota', accent: '',
    desc: 'Planning poker collaboratif en temps réel. Sessions de vote, révélation synchronisée, export CSV/JSON/Jira. Nhost/Hasura avec subscriptions WebSocket.',
    tags: ['SvelteKit', 'Svelte 5', 'Nhost', 'GraphQL WS', 'Tolgee'],
  },
  {
    url: b('gearup'), domain: `${branch}-gearup.localhost`,
    name: 'Gearup', accent: 'coral',
    desc: 'Configurateur postes HP par profil (dev, CDP, commercial). Driver Lomkit, OSDD complet, resources Zod. Remplace le PDF/Excel partagé par cycle d\'achat.',
    tags: ['Astro 5', 'React', 'Lomkit', 'OSDD', 'Tolgee'],
  },
]

const backends = [
  {
    url: b('api'), domain: `${branch}-api.localhost`,
    name: 'Laravel', accent: '',
    desc: 'API REST avec Lomkit. Ressources produits, panier, profils HP, Pulse. Architecture OSDD, 5 layers fonctionnels. Utilisé par Shoplab, Pulse et Gearup.',
    tags: ['PHP 8.3', 'Laravel 11', 'Lomkit', 'Postgres', 'OSDD'],
  },
  {
    url: b('hasura'), domain: `${branch}-hasura.localhost`,
    name: 'Nhost / Hasura', accent: 'gold',
    desc: 'GraphQL auto-généré sur Postgres. Console Hasura, subscriptions WebSocket temps réel. Utilisé par Shoplab et Vota.',
    tags: ['GraphQL', 'WebSocket', 'Hasura v2', 'Postgres'],
  },
  {
    url: b('supabase'), domain: `${branch}-supabase.localhost`,
    name: 'Supabase', accent: '',
    desc: 'PostgREST + Realtime sur Postgres. Chat SAV temps réel via le driver Supabase de Pilota. Utilisé par Shoplab.',
    tags: ['PostgREST', 'Realtime', 'Postgres', 'JWT'],
  },
]

const tooling = [
  {
    url: sh('tolgee'), domain: 'tolgee.localhost',
    name: 'Tolgee', accent: 'gold',
    desc: 'Plateforme i18n self-hosted partagée entre toutes les branches. SDK intégré sur les 4 frontends. Traductions FR/EN. Fallback staticData pour le SSR Next.js.',
    tags: ['i18n', 'Self-hosted', 'FR / EN', 'SDK', 'Partagé'],
  },
  {
    url: 'http://localhost:9000', domain: 'localhost:9000',
    name: 'Sentry', accent: 'coral',
    desc: 'Monitoring d\'erreurs self-hosted. Widget feedback natif (FR) sur tous les frontends. Suivi des incidents par projet.',
    tags: ['Error tracking', 'Self-hosted', 'Feedback'],
  },
  {
    url: sh('traefik'), domain: 'traefik.localhost',
    name: 'Traefik', accent: 'sky',
    desc: 'Reverse proxy unifié partagé entre toutes les branches. Route chaque stack sur ${BRANCH}-*.localhost. Dashboard de supervision en temps réel.',
    tags: ['Reverse proxy', '*.localhost', 'Dashboard', 'Partagé'],
  },
]

function card({ url, domain, name, desc, tags, accent }) {
  return `<a class="card ${accent}" href="${url}" target="_blank" rel="noopener">
    <div class="card-lead">
      <span class="card-status"><span class="dot"></span>Prêt</span>
      <span class="card-domain">${domain}</span>
    </div>
    <p class="card-name">${name}</p>
    <p class="card-desc">${desc}</p>
    <div class="card-tags">${tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
  </a>`
}

document.getElementById('frontends').innerHTML = frontends.map(card).join('')
document.getElementById('backends').innerHTML  = backends.map(card).join('')
document.getElementById('tooling').innerHTML   = tooling.map(card).join('')
</script>

</body>
</html>
