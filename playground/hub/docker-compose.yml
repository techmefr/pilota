networks:
  pilota-proxy:
    external: true
    name: pilota-proxy

services:
  hub:
    image: nginx:alpine
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
    networks:
      - default
      - pilota-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hub-${BRANCH:-dev}.rule=Host(`${BRANCH:-dev}-hub.localhost`)"
      - "traefik.http.routers.hub-${BRANCH:-dev}.entrypoints=websecure"
      - "traefik.http.routers.hub-${BRANCH:-dev}.tls=true"
      - "traefik.http.services.hub-${BRANCH:-dev}.loadbalancer.server.port=80"
