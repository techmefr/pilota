networks:
  pilota-proxy:
    external: true
    name: pilota-proxy

services:
  gearup:
    build:
      context: ../..
      dockerfile: playground/gearup/Dockerfile
    volumes:
      - ./src:/app/playground/gearup/src
    environment:
      PUBLIC_SUPABASE_URL: http://${BRANCH:-dev}-supabase.localhost
      PUBLIC_SUPABASE_ANON_KEY: pilota
      PUBLIC_TOLGEE_API_URL: http://tolgee.localhost
      PUBLIC_TOLGEE_API_KEY: ${PUBLIC_TOLGEE_API_KEY:-}
      PUBLIC_SENTRY_DSN: ${PUBLIC_SENTRY_DSN:-}
    networks:
      - default
      - pilota-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gearup-${BRANCH:-dev}.rule=Host(`${BRANCH:-dev}-gearup.localhost`)"
      - "traefik.http.routers.gearup-${BRANCH:-dev}.entrypoints=web"
      - "traefik.http.services.gearup-${BRANCH:-dev}.loadbalancer.server.port=3003"
