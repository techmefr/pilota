services:
  gearup:
    build:
      context: ../..
      dockerfile: playground/gearup/Dockerfile
    ports:
      - "3003:3003"
    volumes:
      - ./src:/app/playground/gearup/src
    environment:
      PUBLIC_SUPABASE_URL: http://host.docker.internal:54321
      PUBLIC_SUPABASE_ANON_KEY: pilota
      PUBLIC_TOLGEE_API_URL: http://host.docker.internal:8085
      PUBLIC_TOLGEE_API_KEY: ${PUBLIC_TOLGEE_API_KEY:-}
      PUBLIC_SENTRY_DSN: ${PUBLIC_SENTRY_DSN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
