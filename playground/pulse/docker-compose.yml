services:
  pulse:
    build:
      context: ../..
      dockerfile: playground/pulse/Dockerfile
    ports:
      - "3001:3001"
    environment:
      LARAVEL_API_URL: http://host.docker.internal:8000/api
      NEXT_PUBLIC_TOLGEE_API_URL: http://host.docker.internal:8085
      NEXT_PUBLIC_TOLGEE_API_KEY: ${NEXT_PUBLIC_TOLGEE_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
