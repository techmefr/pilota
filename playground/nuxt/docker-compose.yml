services:
  shoplab:
    build:
      context: ../..
      dockerfile: playground/nuxt/Dockerfile
    ports:
      - "3010:3000"
    environment:
      NUXT_PUBLIC_TOLGEE_API_URL: http://host.docker.internal:8085
      NUXT_PUBLIC_TOLGEE_API_KEY: ${NUXT_PUBLIC_TOLGEE_API_KEY:-}
      NUXT_PUBLIC_SENTRY_DSN: ${NUXT_PUBLIC_SENTRY_DSN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
