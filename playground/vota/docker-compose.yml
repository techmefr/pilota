networks:
  pilota-proxy:
    external: true
    name: pilota-proxy

services:
  vota:
    build:
      context: ../..
      dockerfile: playground/vota/Dockerfile
    environment:
      # Server-only — consumed in +page.server.ts, never shipped to the client.
      NHOST_GRAPHQL_URL: http://nhost_hasura:8080/v1/graphql
      NHOST_ADMIN_SECRET: ${NHOST_ADMIN_SECRET:-}
      # Client-public — browser-side realtime WS connects with NO admin secret
      # (requires a Hasura anonymous/public role on the planning_* tables).
      PUBLIC_NHOST_GRAPHQL_URL: http://${BRANCH:-dev}-hasura.localhost/v1/graphql
      PUBLIC_SENTRY_DSN: ${PUBLIC_SENTRY_DSN:-}
      VITE_TOLGEE_API_URL: http://tolgee.localhost
      VITE_TOLGEE_API_KEY: ${VITE_TOLGEE_API_KEY:-}
    networks:
      - default
      - pilota-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vota-${BRANCH:-dev}.rule=Host(`${BRANCH:-dev}-vota.localhost`)"
      - "traefik.http.routers.vota-${BRANCH:-dev}.entrypoints=websecure"
      - "traefik.http.routers.vota-${BRANCH:-dev}.tls=true"
      - "traefik.http.services.vota-${BRANCH:-dev}.loadbalancer.server.port=3002"
