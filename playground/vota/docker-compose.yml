services:
  vota:
    build:
      context: ../..
      dockerfile: playground/vota/Dockerfile
    ports:
      - "3002:3002"
    environment:
      NHOST_GRAPHQL_URL: http://nhost_hasura:8080/v1/graphql
      PUBLIC_NHOST_GRAPHQL_URL: http://hasura.localhost/v1/graphql
      PUBLIC_SENTRY_DSN: ${PUBLIC_SENTRY_DSN:-}
      VITE_TOLGEE_API_URL: http://tolgee.localhost
      VITE_TOLGEE_API_KEY: ${VITE_TOLGEE_API_KEY:-}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vota.rule=Host(`vota.localhost`)"
      - "traefik.http.routers.vota.entrypoints=web"
      - "traefik.http.services.vota.loadbalancer.server.port=3002"
