networks:
  pilota-proxy:
    external: true
    name: pilota-proxy

services:
  laravel:
    build:
      context: .
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: laravel_db
      DB_PORT: "5432"
      DB_DATABASE: pilota_laravel
      DB_USERNAME: pilota
      DB_PASSWORD: pilota
      APP_FRONTEND_URL: http://${BRANCH:-dev}-shoplab.localhost
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
    depends_on:
      laravel_db:
        condition: service_healthy
    networks:
      - default
      - pilota-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.laravel-${BRANCH:-dev}.rule=Host(`${BRANCH:-dev}-api.localhost`)"
      - "traefik.http.routers.laravel-${BRANCH:-dev}.entrypoints=websecure"
      - "traefik.http.routers.laravel-${BRANCH:-dev}.tls=true"
      - "traefik.http.services.laravel-${BRANCH:-dev}.loadbalancer.server.port=8000"

  laravel_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pilota_laravel
      POSTGRES_USER: pilota
      POSTGRES_PASSWORD: pilota
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pilota -d pilota_laravel"]
      interval: 5s
      timeout: 5s
      retries: 10
