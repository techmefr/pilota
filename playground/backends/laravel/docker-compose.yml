services:
  laravel:
    build:
      context: .
    ports:
      - "8000:8000"
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: laravel_db
      DB_PORT: "5432"
      DB_DATABASE: pilota_laravel
      DB_USERNAME: pilota
      DB_PASSWORD: pilota
    depends_on:
      laravel_db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.laravel.rule=Host(`api.localhost`)"
      - "traefik.http.routers.laravel.entrypoints=web"
      - "traefik.http.services.laravel.loadbalancer.server.port=8000"

  laravel_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pilota_laravel
      POSTGRES_USER: pilota
      POSTGRES_PASSWORD: pilota
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pilota -d pilota_laravel"]
      interval: 5s
      timeout: 5s
      retries: 10
