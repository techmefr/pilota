networks:
  pilota-proxy:
    external: true
    name: pilota-proxy

services:
  nhost_hasura:
    image: hasura/graphql-engine:v2.36.0
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://pilota:pilota@nhost_db:5432/pilota_nhost
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_DEV_MODE: "true"
      HASURA_GRAPHQL_ADMIN_SECRET: pilota-admin-secret
      HASURA_GRAPHQL_UNAUTHORIZED_ROLE: public
      HASURA_GRAPHQL_STRINGIFY_NUMERIC_TYPES: "true"
    depends_on:
      nhost_db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    networks:
      - default
      - pilota-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hasura-${BRANCH:-dev}.rule=Host(`${BRANCH:-dev}-hasura.localhost`)"
      - "traefik.http.routers.hasura-${BRANCH:-dev}.entrypoints=websecure"
      - "traefik.http.routers.hasura-${BRANCH:-dev}.tls=true"
      - "traefik.http.services.hasura-${BRANCH:-dev}.loadbalancer.server.port=8080"

  nhost_db:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: pilota_nhost
      POSTGRES_USER: pilota
      POSTGRES_PASSWORD: pilota
    volumes:
      # All migrations run on a fresh DB, in filename order. 002 creates the
      # planning_* tables the Hasura metadata tracks — without it metadata apply
      # fails (inconsistent: no such table) and Vota's GraphQL/realtime is dead.
      - ./nhost/migrations/default/001_init/up.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./nhost/migrations/default/002_vota_planning/up.sql:/docker-entrypoint-initdb.d/02_vota_planning.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pilota -d pilota_nhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  nhost_init:
    image: alpine:3.19
    depends_on:
      nhost_hasura:
        condition: service_healthy
    volumes:
      - ./nhost/metadata/hasura-metadata.json:/hasura-metadata.json
    entrypoint:
      - sh
      - -c
      - "apk add --no-cache curl && curl -f -X POST -H 'X-Hasura-Admin-Secret: pilota-admin-secret' -H 'Content-Type: application/json' -d @/hasura-metadata.json http://nhost_hasura:8080/v1/metadata"
    restart: on-failure
