name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install

      - name: Build packages
        run: pnpm --filter "./packages/**" build

      - name: Test packages
        run: pnpm --filter "./packages/**" test
