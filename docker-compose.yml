services:
  traefik:
    image: traefik:v3
    ports:
      - "80:80"
      - "8090:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.localhost`)"
      - "traefik.http.routers.traefik.entrypoints=web"
      - "traefik.http.routers.traefik.service=api@internal"

  tolgee:
    image: tolgee/tolgee:latest
    ports:
      - "8085:8080"
    environment:
      spring_datasource_url: "jdbc:h2:file:/data/tolgee;DB_CLOSE_ON_EXIT=FALSE"
      TOLGEE_AUTHENTICATION_ENABLED: "true"
      TOLGEE_AUTHENTICATION_INITIAL_USERNAME: admin
      TOLGEE_AUTHENTICATION_INITIAL_PASSWORD: admin1234
      TOLGEE_FRONTEND_URL: http://tolgee.localhost
      TOLGEE_CORS_ALLOWED_ORIGINS: "*"
    volumes:
      - tolgee_data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tolgee.rule=Host(`tolgee.localhost`)"
      - "traefik.http.routers.tolgee.entrypoints=web"
      - "traefik.http.services.tolgee.loadbalancer.server.port=8080"

volumes:
  tolgee_data:
    external: true
    name: tolgee_data

include:
  - playground/backends/laravel/docker-compose.yml
  - playground/backends/nhost/docker-compose.yml
  - playground/backends/supabase/docker-compose.yml
  - playground/nuxt/docker-compose.yml
  - playground/pulse/docker-compose.yml
  - playground/vota/docker-compose.yml
  - playground/gearup/docker-compose.yml
  - playground/hub/docker-compose.yml
